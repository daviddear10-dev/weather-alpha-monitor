name: Hong Kong Afternoon Observation

on:
  workflow_dispatch:
  # Automatic schedule temporarily disabled; run manually with workflow_dispatch.

concurrency:
  group: repository-data-writer-${{ github.ref }}
  cancel-in-progress: false
  queue: max

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Capture HKO afternoon observation
        run: python -m weather_monitor.capture_hong_kong_afternoon_observation

      - name: Commit and push observation if changed
        run: |
          DATA_FILE="docs/hong_kong_realtime_history.json"

          if [ ! -f "$DATA_FILE" ]; then
            echo "Realtime history file does not exist, nothing to commit"
            exit 0
          fi

          git add "$DATA_FILE"

          if git diff --cached --quiet; then
            echo "Realtime history unchanged, nothing to commit"
            exit 0
          fi

          git commit -m "Update Hong Kong afternoon observation"

          for attempt in 1 2 3; do
            if git pull --rebase && git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi

            delay=$((attempt * 5))
            echo "Push attempt $attempt failed, retrying in ${delay}s..."
            sleep "$delay"
          done

          echo "Failed to push after 3 attempts"
          exit 1
