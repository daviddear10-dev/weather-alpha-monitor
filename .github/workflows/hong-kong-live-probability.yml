name: Hong Kong Live Probability

on:
  workflow_dispatch:
  schedule:
    # HKT 09:00-13:40, every 20 minutes = UTC 01:00-05:40
    - cron: "0,20,40 1-5 * * *"

    # HKT 17:05 = UTC 09:05, final daily observation for review
    - cron: "5 9 * * *"

concurrency:
  group: repository-data-writer-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Capture Hong Kong live probability
        run: python -m weather_monitor.capture_hong_kong_live_probability

      - name: Commit probability if changed
        run: |
          JSON_FILE="docs/hong_kong_live_probability.json"

          if [ ! -f "$JSON_FILE" ]; then
            echo "Probability file does not exist, nothing to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$JSON_FILE"

          if git diff --cached --quiet; then
            echo "Probability file unchanged, nothing to commit"
            exit 0
          fi

          git commit -m "Update Hong Kong live probability"

          for attempt in 1 2 3; do
            if git pull --rebase && git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done

          echo "Failed to push after 3 attempts"
          exit 1
