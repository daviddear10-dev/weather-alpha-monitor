name: Hong Kong Live Probability

on:
  workflow_dispatch:
  schedule:
    # HKT 09:00-13:40, every 20 minutes = UTC 01:00-05:40
    - cron: "0,20,40 1-5 * * *"

concurrency:
  group: repository-data-writer-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Hong Kong maintenance flow
        run: python -m weather_monitor.hong_kong_maintenance
