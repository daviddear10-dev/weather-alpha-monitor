name: Weather Monitor

on:
  schedule:
    # Beijing 18:00
    - cron: "0 10 * * *"
    # Beijing 20:30
    - cron: "30 12 * * *"
    # Beijing 23:00
    - cron: "0 15 * * *"
    # Beijing 07:00 next day
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repository-data-writer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-weather-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weather monitor
        run: python -m weather_monitor

      - name: Run Polymarket candidate finder
        run: python -m weather_monitor.polymarket_candidates

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/weather_data.json docs/polymarket_candidates.json

          if git diff --cached --quiet; then
            echo "No data changes to commit."
            git restore weather_forecasts.sqlite 2>/dev/null || true
            exit 0
          fi

          git commit -m "Update weather and market candidate data"

          # SQLite is for this runner only, never committed
          git restore weather_forecasts.sqlite 2>/dev/null || true

          echo "Working tree before pull:"
          git status --short

          for attempt in 1 2 3; do
            if git pull --rebase && git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done

          echo "Failed to push after 3 attempts"
          exit 1
