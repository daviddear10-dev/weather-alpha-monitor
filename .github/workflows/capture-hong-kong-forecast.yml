name: Capture Hong Kong Forecast

on:
  workflow_dispatch:
  schedule:
    # HKT 07:30 = UTC 23:30 (prev day)
    - cron: "30 23 * * *"
    # HKT 09:30 = UTC 01:30
    - cron: "30 1 * * *"
    # HKT 11:30 = UTC 03:30
    - cron: "30 3 * * *"

concurrency:
  group: repository-data-writer-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Capture HKO forecast
        run: python -m weather_monitor.capture_hong_kong_forecast

      - name: Commit cache if changed
        run: |
          CACHE_FILE="data/hong_kong_today_forecast_cache.json"

          if [ ! -f "$CACHE_FILE" ]; then
            echo "Cache file does not exist, nothing to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$CACHE_FILE"

          if git diff --cached --quiet; then
            echo "Cache file unchanged, nothing to commit"
            exit 0
          fi

          git commit -m "Update Hong Kong forecast cache"
          git pull --rebase
          git push
